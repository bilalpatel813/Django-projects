<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PieBlogs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f5f5f5;
}

/* Navbar */
.navbar {
    background: #fff;
    padding: 15px;
    text-align: center;
    font-weight: 600;
    font-size: 20px;
    border-bottom: 1px solid #ddd;
    position: sticky;
    top: 0;
}

/* Feed container */
.feed {
    max-width: 600px;
    margin: auto;
}

/* Post card */
.post {
    background: #fff;
    padding: 15px;
    border-bottom: 1px solid #eee;
    display: flex;
    gap: 12px;
}

/* Profile circle */
.avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #667eea;
    flex-shrink: 0;
}

/* Content */
.post-content {
    width: 100%;
}

.username {
    font-weight: 600;
    font-size: 14px;
}

.title {
    font-weight: 600;
    margin: 5px 0;
    font-size: 16px;
}

.text {
    font-size: 14px;
    color: #555;
}

/* Actions */
.actions {
    margin-top: 10px;
    display: flex;
    gap: 15px;
    font-size: 14px;
    color: #777;
    cursor: pointer;
}

.actions span:hover {
    color: #000;
}

/* Floating button */
.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #667eea;
    color: #fff;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    font-size: 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    cursor: pointer;
}
</style>

</head>
<body>

<div class="navbar">🍰 PieBlogs</div>

<div class="feed">

    {% for post in posts %}
<div class="post">
    <div class="avatar"></div>
    <div class="post-content">
        <div class="username">@{{ post.user }}</div>
        <div class="title">{{ post.title }}</div>
        <div class="text">{{ post.content }}</div>
    </div>
</div>
{% endfor %}

            <div class="actions">
                <span>❤️ Like</span>
                <span>💬 Comment</span>
                <span>🔁 Share</span>
            </div>
        </div>
    </div>

</div>

<!-- Floating Button -->
<div class="fab">+</div>

</body>
</html>
