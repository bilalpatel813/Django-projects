<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-KyZXEAg3QhqLMpG8r+Knujsl5+5hb7x1X4Gx7sYl9n+5dYvX7J6N5p9N1R1GxJkEJZJZq+Q7k8D1Xy8fQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
<style>
 /* NAVBAR */
.navbar{
    background:#2f3e9e;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
}

.logo{
    width:60px;
    height:60px;
    border:2px solid white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
}

.nav-links{
    display:flex;
    gap:40px;
    font-size:18px;
}
.nav-links a{
    text-decoration: none;
}
.nav-links i{
    margin-right:8px;
}
.icons{
  font-size: 30px;
  color:black;
}

.footer{
    margin-top:30px;
    display:flex;
    justify-content:space-between;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.footer i{
    margin-right:8px;
}

.footer small{
    color:#555;
}

/* MOBILE */
@media(max-width:768px){
    .profile{
        flex-direction:column;
        gap:20px;
        align-items:center;
    }

    .attendance{
        flex-direction:column;
        gap:20px;
        align-items:center;
    }

    .footer{
        flex-direction:column;
        gap:10px;
    }
}

  </style>
</head>
<body>
{% block nav %}
{% endblock %}
 <!-- NAVBAR -->
<div class="navbar">
    <div class="logo">LOGO</div>
    <div class="nav-links">
        <a href="{% url 'home' %}"><span class ="icons"><i class="fa-solid fa-house"></i> Home</span></a>
        <a href='{% url 'logout' %}'><span class="icons"><i class="fa-solid fa-right-from-bracket"></i> Logout</span></a>
    </div>
</div>
	{% block content %}
	{% endblock %}
	  <div class="footer">
    <div>
        <h3>ISAMIL Yusuf College</h3>
        <small>Arts, Science and Commerce</small>
    </div>
    <div>
        <h3>Contact</h3>
        <small><i class="fa-solid fa-envelope"></i> bilalpatel78600@gmail.com</small>
    </div>
</div>
	<script>
	</script>
</body>
</html>
