<!DOCTYPE html>
<html>
<head>
<title>Signup - PieBlogs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins;
    background:#f5f5f5;
}

/* Center */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Card */
.card{
    width:320px;
    background:white;
    padding:25px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* Logo */
.logo{
    font-family:Pacifico;
    color:#667eea;
    font-size:22px;
}

/* Input */
input{
    width:100%;
    padding:10px;
    margin:15px 0;
    border-radius:20px;
    border:1px solid #ccc;
}

/* Button */
button{
   margin-top: 10px;
    padding:8px 20px;
    border:none;
    border-radius:20px;
    background:#667eea;
    color:white;
    cursor:pointer;
}

/* Login text */
.login{
    font-size:12px;
    margin-top:10px;
}

.login a{
    color:#667eea;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">PieBlogs</div>
<h3>Create your account</h3>

<input type="email" placeholder="Enter your email">

<div class="login">
Already have account? <a href="#">Login</a>
</div>

<button>Submit</button>

</div>

</div>

</body>
</html>
