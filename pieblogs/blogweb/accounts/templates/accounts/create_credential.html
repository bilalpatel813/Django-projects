<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - PieBlogs</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Poppins;
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        /* CARD */
        .card {
            width: 340px;
            background: linear-gradient(145deg, #111, #0a0a0a);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            color: white;
        }
        
        /* STEP TEXT */
        .step {
            text-align: center;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        /* TITLE */
        .title {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 25px;
        }
        
        /* LABEL */
        .label {
            font-size: 14px;
            margin-bottom: 6px;
            margin-top: 12px;
            margin-left:10px; 
            color: #ccc;
        }
        
        /* INPUT */
        .input {
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        
        .input::placeholder {
            color: #777;
        }
        
        /* INPUT FOCUS */
        .input:focus {
            border: 1px solid #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        
        /* BUTTON */
        .btn {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 25px;
            background: #667eea;
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .btn:hover {
            background: #5563d6;
        }
        
        /* EXTRA SPACING FIX */
        .group {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    
    <div class="card">
        
        <div class="step">Step 1 of 3</div>
        
        <div class="title">Create Account</div>
        <form method="POST">
            {% csrf_token %} 
            {% if error %}
<div style="
    background:#ffe0e0;
    color:#b30000;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
">
    {{ error }}
</div>
{% endif %}
        <div class="group">
            <div class="label">Username:</div>
            <input type="text" class="input" name="username" placeholder="Create Username">
        </div>
        
        <div class="group">
            <div class="label">Email:</div>
            <input type="email" class="input" name="email" placeholder="@gmail.com">
        </div>
        
        <div class="group">
            <div class="label">Password:</div>
            <input type="password" class="input"name="password1" placeholder="Create Password">
        </div>
        
        <div class="group">
            <div class="label">Re-enter Password:</div>
            <input type="password" class="input" name="password2" placeholder="Re-enter Password">
        </div>
        
        <button class="btn">Create</button>
        </form>
        {{ form.errors }}
    </div>
    
</body>

</html>
