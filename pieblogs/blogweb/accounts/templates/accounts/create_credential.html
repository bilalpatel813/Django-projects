<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">
<style>
body {font-family:Poppins;background:#f5f5f5;margin:0;}
.container {
  display:flex;justify-content:center;align-items:center;height:100vh;
  
}
.card {
  background:white;padding:25px;border-radius:16px;width:320px;text-align:center;
  
}

.steps {font-size:12px;color:#777;margin-bottom:10px;}

.input-group {
    position: relative;
}

input {
    width:80%;
    padding:10px 35px 10px 10px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

/* Tick icon */
.tick {
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    color:green;
    display:none;
}

button {width:100%;padding:10px;border-radius:20px;border:none;background:#667eea;color:white;}
</style>
</head>

<body>
<div class="container">
<div class="card">

<div class="steps">Step 3 of 4(almost there!)</div>

<h3>Create Account</h3>
<form method='POST' action='{% url 'create-account' %}'>
<div class="input-group">
{% csrf_token %}
<input type="text" id="username" name='username' placeholder=" Create Username" oninput="validateUsername()">
<span class="tick" id="userTick">✔</span>
</div>

<div class="input-group">
<input type="password" id="password" name='password1' placeholder=" Create Password" oninput="validatePassword()">
<span class="tick" id="passTick">✔</span>
</div>

<div class="input-group">
  
  <input type="password" id="password" name='password2' placeholder=" Re-enter Password" oninput="validatePassword()">
  <span class="tick" id="passTick">✔</span>
</div>

<button>Create</button>
</form>
{{ form.errors }}
</div>
</div>

<script>
function validateUsername(){
    let val = document.getElementById("username").value;
    document.getElementById("userTick").style.display = val.length > 3 ? "block" : "none";
}

function validatePassword(){
    let val = document.getElementById("password").value;
    document.getElementById("passTick").style.display = val.length > 5 ? "block" : "none";
}
</script>

</body>
</html>
