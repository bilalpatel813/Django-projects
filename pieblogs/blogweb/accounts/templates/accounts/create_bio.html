<!DOCTYPE html>
<html>
<head>
<title>Profile Setup - PieBlogs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins;
    background:#f5f5f5;
}

/* Center layout */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Card */
.card{
    width:340px;
    background:white;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* Logo */
.logo{
    font-family:Pacifico;
    color:#667eea;
    font-size:22px;
    margin-bottom:5px;
}

/* ✅ STEP INDICATOR */
.steps{
    font-size:12px;
    color:#777;
    margin-bottom:10px;
}

/* Labels */
.labelpfp {
    text-align:left;
    font-size:13px;
    font-weight:500;
    margin:1px 0 50px;
    color:#555;
    margin-left:108px;
}

.label{
    text-align:left;
    font-size:13px;
    font-weight:500;
    margin:15px 0 5px;
    color:#555;
}

/* PFP Box */
.pfp{
    width:110px;
    height:110px;
    border-radius:50%;
    border:2px dashed #667eea;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    overflow:hidden;
    transition:0.3s;
    background:#fafaff;
}

.pfp:hover{
    transform:scale(1.05);
}

.pfp span{
    font-size:12px;
    color:#667eea;
}

.pfp img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

/* Bio */
textarea{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid #ccc;
    resize:none;
    font-size:13px;
    min-height:40px;
}

/* Button */
button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:25px;
    background:#667eea;
    color:white;
    font-size:14px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#5563d6;
}

/* Footer */
.footer{
    text-align:center;
    font-size:12px;
    margin-top:15px;
    color:#666;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">PieBlogs</div>

<!-- ✅ STEP ADDED HERE -->
<div class="steps">Step 4 of 4</div>

<h3>Welcome 🎉</h3>

<!-- PFP -->
<label class="pfp">
<input type="file" hidden onchange="preview(event)">
<span id="pfpText">Tap to upload</span>
<img id="pfpImg">
</label>

<div class="labelpfp">Add your Profile Pic</div>

<div class="label">Create your Bio</div>

<textarea placeholder="Tell people about yourself..."></textarea>

<button>Finish</button>

</div>

</div>

<div class="footer">
© PieBlogs — made with ❤️
</div>

<script>
function preview(e){
    const file = e.target.files[0];
    if(file){
        document.getElementById("pfpImg").src = URL.createObjectURL(file);
        document.getElementById("pfpImg").style.display = "block";
        document.getElementById("pfpText").style.display = "none";
    }
}
</script>

</body>
</html>
