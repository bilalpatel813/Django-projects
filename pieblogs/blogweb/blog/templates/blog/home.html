<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PieBlogs</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Pacifico&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #f5f5f5;
    animation: fadePage 0.5s ease;
}


/* Tabs */
.tabs {
    display: flex;
    justify-content: center;
    background: white;
    border-top: 1px solid #eee;
    border-bottom: 1px solid #ddd;
}

.tab {
    padding: 10px 20px;
    cursor: pointer;
    color: #777;
    border-bottom: 2px solid transparent;
}

.tab.active {
    color: black;
    border-bottom: 2px solid #667eea;
    font-weight: 500;
}

/* Feed */
.feed {
    max-width: 600px;
    margin: auto;
}

/* Post */
.post {
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 12px;
    animation: fadeUp 0.5s ease;
}

.header {
    display: flex;
    align-items: center;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #667eea;
    margin-right: 10px;
}

.username {
    font-weight: 600;
    font-size: 14px;
}

.title {
    font-weight: 600;
    margin: 8px 0;
}

.content {
    font-size: 14px;
    color: #555;
}

/* Actions */
.actions {
    margin-top: 10px;
    display: flex;
    gap: 15px;
    color: #777;
}


/* Animations */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}

@keyframes fadePage {
    from { opacity: 0;}
    to { opacity: 1;}
}
</style>
</head>

<body>
{% extends 'blog/base.html' %}
{% block nav %}
{% endblock %}
{% block content %}
<!-- Tabs -->
<div class="tabs">
    <div class="tab active" onclick="switchTab('top')">Top Posts</div>
    <div class="tab" onclick="switchTab('friends')">Friends</div>
</div>

<!-- Feed -->
<div class="feed">
{% for post in posts %}
    <div class="post top">
        <div class="header">
            <div class="avatar"></div>
            <div class="username">@ {{ post.author }}</div>
        </div>
        <div class="title">{{ post.title }}</div>
        <div class="content">{{ post.content }}</div>
        <div class="actions">
            ❤️ 💬
        </div>
    </div>
{% endfor %}
    <div class="post friends" style="display:none;">
        <div class="header">
            <div class="avatar"></div>
            <div class="username">@friend</div>
        </div>
        <div class="title">Friend Post</div>
        <div class="content">Friends-only content 👀</div>
        <div class="actions">
            ❤️ 💬
        </div>
    </div>

</div>

<script>
function switchTab(type){
    let tabs = document.querySelectorAll('.tab');
    tabs.forEach(t => t.classList.remove('active'));

    if(type === 'top'){
        tabs[0].classList.add('active');
    } else {
        tabs[1].classList.add('active');
    }

    document.querySelectorAll('.top').forEach(p=>{
        p.style.display = (type==='top') ? 'block':'none';
    });

    document.querySelectorAll('.friends').forEach(p=>{
        p.style.display = (type==='friends') ? 'block':'none';
    });
}
</script>
{% endblock %}
</body>
</html>
