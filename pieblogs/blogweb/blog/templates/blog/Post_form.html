<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Post</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f5f5f5;
    margin: 0;
}

/* Topbar */
.topbar {
    background: white;
    border-bottom: 1px solid #ddd;
}

.logo {
    font-family: 'Pacifico', cursive;
    text-align: center;
    font-size: 22px;
    color: #667eea;
    padding: 0;
}

.nav-icons {
    display: flex;
    justify-content: space-around;
    padding: 10px;
}
.nav-item {
    text-align: center;
    font-size: 12px;
    
}
.nav-item i {
    font-size: 18px;
    display: block;
    margin-bottom: 3px;
}

/* Container */
.container {
    max-width: 600px;
    margin: 15px auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
}

/* Heading */
.heading {
    text-align: center;
    font-weight: 600;
    margin-bottom: 20px;
}

/* Layout FIXED */
.form-layout {
    display: flex;
    flex-direction: column; /* FIX */
    gap: 15px;
}

/* Image Box FIXED */
.image-box span {
    color: #777;
    width: 100%;
    height: 180px;
    border: 2px dashed #ccc;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    position: relative;
    overflow: hidden; /* FIX */
}

 

/* Preview Image FIXED */
.image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* FIX */
}

.change-btn {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0, 0, 0, 0.6);
    color: white;
    padding: 6px;
    border-radius: 50%;
    font-size: 12px;
    display: none;
    cursor: pointer;
}

/* Inputs */
input, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
}

textarea {
    height: 120px;
    resize: none;
}

/* Buttons */
.buttons {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.cancel {
    background: #eee;
}

.preview {
    background: #ffd166;
}

.publish {
    background: #667eea;
    color: white;
}

/* Footer */
.footer {
    text-align: center;
    font-size: 12px;
    color: #666;
    padding: 15px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="topbar">
    <div class="nav-icons">
        <div class="nav-item">
    <div class="logo">PieBlogs</a></div>
</div>

<div class="nav-item">
    <i class="fa-solid fa-house"></i>
    Home
</div>
<div class="nav-item">
    <i class="fa-solid fa-plus"></i>
    Create
</div>
<div class="nav-item">
    <i class="fa-solid fa-magnifying-glass"></i>
    Search
</div>
<div class="nav-item active">
    <i class="fa-solid fa-user"></i>
    Profile
</div>
    </div>
</div>

<!-- Form -->
<div class="container">

    <div class="heading">Create Your Post</div>

    <form method="POST" enctype="multipart/form-data" action="">
     {% csrf_token %} 
       

        <!-- Inputs -->
        <input type="text" name="title" placeholder="Enter title">
        <textarea name="content" placeholder="Write content..."></textarea>
           <!-- Image Upload -->
 <label class="image-box">
     <label class="image-box" id="imageBox">
         <span id="text">Add Image</span>
         <input type="file" id="fileInput" accept="image/*" hidden onchange="previewImage(event)" name="contentimg">
         <img id="preview">
         
         <!-- Change Button 
    <div class="change-btn" onclick="changeImage(event)">
    <i class="fa-solid fa-pen"></i>
</div> -->
     </label>

        <!-- Buttons -->
        <div class="buttons">
            <button type="button" class="cancel">Cancel</button>
            <button type="button" class="preview">Preview</button>
            <button type="submit" class="publish">Publish</button>
        </div>

    </form>

</div>

<!-- Footer -->
<div class="footer">
    © PieBlogs — made with ❤️
</div>

<script>
function previewImage(event) {
    const file = event.target.files[0];
    const preview = document.getElementById("preview");
    const text = document.getElementById("text");
    const box = document.getElementById("imageBox");
    
    if (file) {
        preview.src = URL.createObjectURL(file);
        text.style.display = "none";
        
        // Disable full box click
        box.style.pointerEvents = "none";
        
        // Enable edit button
        document.querySelector(".change-btn").style.display = "block";
    }
}

function changeImage(event) {
    event.stopPropagation();
    document.getElementById("fileInput").click();
}
</script>

</body>
</html>
