<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Post</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f5f5f5;
    margin: 0;
}

/* Topbar */
.topbar {
    background: white;
    border-bottom: 1px solid #ddd;
}

.logo {
    font-family: 'Pacifico', cursive;
    text-align: center;
    font-size: 22px;
    color: #667eea;
    padding: 0;
}

.nav-icons {
    display: flex;
    justify-content: space-around;
    padding: 10px;
}
.nav-item {
    text-align: center;
    font-size: 12px;
    
}
.nav-item i {
    font-size: 18px;
    display: block;
    margin-bottom: 3px;
    cursor: pointer;
}
.nav-item a {
    text-decoration:none;
    color:black;
}

.modal {
    display: none; /* 🔥 MUST BE NONE */
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: white;
    padding: 20px;
    width: 280px;
    border-radius: 10px;

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
.delete-btn {
    height: 30px;
    background: red;
    color: white;
    padding: 8px;
    border: none;
    border-radius:5%;
    margin-top: 10px;
    margin-left: 60px;
}
/* Footer */
.footer {
    text-align: center;
    font-size: 12px;
    color: #666;
    padding: 15px;
}
</style>
</head>

<body>
{% block nav %}
{% endblock %}
<!-- Navbar -->
<div class="topbar">
    <div class="nav-icons">
        <div class="nav-item">
    <div class="logo"><a href="/pieblogs/home/">PieBlogs</a></div>
</div>

<div class="nav-item">
<a href="/pieblogs/home/">
    <i class="fa-solid fa-house"></i>
    Home
</a>    
</div>
<div class="nav-item">
<a href="/pieblogs/create/">
    <i class="fa-solid fa-plus"></i>
    Create
</a>
</div>
<div class="nav-item">
<a href="">
    <i class="fa-solid fa-magnifying-glass"></i>
    Search
</a>
</div>
<div class="nav-item active">
<a href="/pieblogs/profile/">
    <i class="fa-solid fa-user"></i>
    Profile
</a>
</div>
    </div>
</div>
{% block modal %}
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <p id="modalText">Are you sure?</p>

        <form id="deleteForm" method="POST">
            {% csrf_token %}
            <button type="submit" class="delete-btn">Yes, Delete</button>
        </form>

        <button onclick="closeModal()">Cancel</button>
    </div>
</div>
{% endblock %}

{% block content %}
{% endblock %}
<!-- Footer -->
<div class="footer">
    © PieBlogs — made with ❤️
</div>

</body>
</html>
