<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PieBlogs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f5f5f5;
    margin: 0;
}

/* Topbar */
.topbar {
    background: white;
    border-bottom: 1px solid #ddd;
}

.logo {
    font-family: 'Pacifico', cursive;
    text-align: center;
    font-size: 22px;
    color: #667eea;
}

.nav-icons {
    display: flex;
    justify-content: space-around;
    padding: 10px;
}

.nav-item {
    text-align: center;
    font-size: 12px;
}

.nav-item i {   
    font-size: 20px;
    display: block;
    margin-bottom: 3px;
    padding-top:10px;
}

.nav-item a {
    text-decoration:none;
    color:black;
}

/* PFP */
.pfp-nav {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #667eea;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    margin: auto;
    cursor: pointer;
}

/*OVERLAY */
.overlay{
    display:none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    justify-content:center;
    align-items:center;
    z-index:999;
    animation: fadeIn 0.3s ease;
}

/* Animation */
@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes slideUp {
    from {
        transform: translateY(40px);
        opacity:0;
    }
    to {
        transform: translateY(0);
        opacity:1;
    }
}

/* Container */
.settings-container {
    width:100%;
    max-width:360px;
    padding:15px;
    animation: slideUp 0.3s ease;
}

/* Card */
.settings-card {
    background:white;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
    overflow:hidden;
}

/* Header */
.settings-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px;
}

.user-profile {
    display:flex;
    align-items:center;
    gap:10px;
}

.avatar {
    width:38px;
    height:38px;
    background:#667eea;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

.username {
    font-weight:600;
    font-size:16px;
}

/* Close button */
.close-btn {
    flex: unset !important; 
    background:#f0f2f5;
    border:none;
    width:32px;
    height:32px;
    border-radius:50%;
    cursor:pointer;
}

/* Divider */
.divider {
    height:1px;
    background:#eee;
}

/* Items */
.settings-item {
    display:flex;
    align-items:center;
    padding:15px 18px;
    text-decoration:none;
    color:#111;
    font-size:15px;
    transition:0.2s;
}

.settings-item i {
    width:36px;
    height:36px;
    background:#f0f2f5;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:12px;
    color:#667eea;
}

.settings-item:hover {
    background:#f8f9ff;
}

/* Logout */
.logout-item i {
    background:#ffecec;
    color:#e63946;
}

.logout-item span {
    color:#e63946;
}

/* Delete Modal */
.modal {
    display: none;
    position: fixed;
    z-index: 9999;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: white;
    padding: 20px;
    width: 280px;
    border-radius: 10px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
.model-content p {
    color:
}
.delete-btn {
    background: red;
    color: white;
    border: none;
    margin-top:10px;
    margin-left:80px;
    margin-bottom:10px;
    width:80px;
    height:20px;
    border-radius:30px;
}
.cancel-btn{
    background:black;
    color:white;
    margin-left:80px;
    width:80px;
    height:20px;
    border-radius:30px;
}
/* Footer */
.footer {
    text-align: center;
    font-size: 12px;
    color: #666;
    padding: 15px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="topbar">
    <div class="nav-icons">

        <div class="nav-item">
            <div class="logo"><a href="/pieblogs/home/">PieBlogs</a></div>
        </div>

        <div class="nav-item">
            <a href="/pieblogs/home/">
                <i class="fa-solid fa-house"></i>
               
            </a>
        </div>

        <div class="nav-item">
            <a href="/pieblogs/create/">
                <i class="fa-solid fa-plus"></i>
                
            </a>
        </div>

        <div class="nav-item">
            <a href="javascript:void(0)" onclick="togglesearch()"> 
                <i class="fa-solid fa-magnifying-glass"></i>
                
            </a>
        </div>

        <!-- 🔥 PFP (REPLACED PROFILE ICON) -->
        <div class="nav-item">
            <div  onclick="openSettings()">
                <i class="fa-solid fa-user"></i>
            </div>
            
        </div>

    </div>
</div>
<!-- 🔥 SETTINGS MODAL -->
<div class="overlay" id="settingsModal">

    <div class="settings-container">
        <div class="settings-card">

            <!-- Header -->
            <div class="settings-header">
                <div class="user-profile">
                    <div class="avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <span class="username">@{{ request.user.username }}</span>
                </div>

                <button class="close-btn" onclick="closeSettings()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="divider"></div>

            <!-- Items -->
            <a href="{% url 'profile' user.username %}" class="settings-item">
                <i class="fa-solid fa-circle-user"></i>
                <span>Profile</span>
            </a>

            <a href="#" class="settings-item">
                <i class="fa-solid fa-signs-post"></i>
                <span>Posts</span>
            </a>

            <a href="#" class="settings-item">
                <i class="fa-solid fa-gear"></i>
                <span>Settings</span>
            </a>

            <div class="divider"></div>

            <a href="/pieblogs/login/" class="settings-item logout-item">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </a>

        </div>
    </div>

</div>

<!-- DELETE MODAL -->
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <p id='modalText'></p>

        <form id="deleteform" method='POST'>
             {% csrf_token %}
            <button class="delete-btn" onclick="openModal({{ post.pk }}, '{{ post.title }}')" >Yes</button>
        </form>

        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>
</div>

<!-- CONTENT -->
{% block content %}{% endblock %}

<!-- FOOTER -->
<div class="footer">
    © PieBlogs — made with ❤️
</div>

<script>
function openSettings(){
    document.getElementById("settingsModal").style.display="flex";
}

function closeSettings(){
    document.getElementById("settingsModal").style.display="none";
}

function openModal(postId,title) {
    document.getElementById("deleteModal").style.display = "block";

    // set form action dynamically
document.getElementById("modalText").innerText =
        "Are you sure you want to delete '"+title+"'?";
  document.getElementById("deleteform").action = `/pieblogs/delete/${postId}/`;
}

function closeModal() {
    document.getElementById("deleteModal").style.display = "none";
}
</script>

</body>
</html>
