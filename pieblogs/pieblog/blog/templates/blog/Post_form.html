{% extends 'blog/base.html' %}
{% block content %}
<style>
body{
    margin:0;
    font-family:Poppins;
    background:#f5f5f5;
}

/* Center layout */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Card */
.card{
    width:340px;
    background:white;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* Logo */
.logo{
    font-family:Pacifico;
    color:#667eea;
    font-size:22px;
    margin-bottom:5px;
}

/* ✅ STEP INDICATOR */
.steps{
    font-size:12px;
    color:#777;
    margin-bottom:10px;
}

/* Labels */
.labelpfp {
    text-align:left;
    font-size:13px;
    font-weight:500;
    margin:10px 0 10px;
    color:#555;
    margin-left:120px;
}

.label{
    text-align:left;
    font-size:13px;
    font-weight:500;
    margin:15px 0 5px;
    color:#555;
}

/* PFP Box */
.pfp{
    width:120px;
    height:120px;
    border-radius:10%;
    border:2px dashed dimgrey;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    overflow:hidden;
    transition:0.3s;
    background:#fafaff;
}

.pfp:hover{
    transform:scale(1.05);
}

.pfp span{
    font-size:12px;
    color:#667eea;
}

.pfp img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

/* Bio */
textarea{
    width:90%;
    padding:12px;
    border-radius:12px;
    border:1px solid #ccc;
    resize:none;
    font-size:13px;
    height:30px;
}

/* Button */
.buttons {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 10px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.cancel {

    border-radius: 10px;
    background: #eee;
    text-align: center;
    text-decoration: none;
    color: black;
    display: inline-block;
}

.preview {
    background: #ffd166;
}

.publish {
    background: #667eea;
}

/* Footer */
.footer{
    text-align:center;
    font-size:12px;
    margin-top:15px;
    color:#666;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Create your post</h3>
<form method='POST' enctype='multipart/form-data'>
{% csrf_token %}
<!-- PFP -->
<label class="pfp">
<input type="file" hidden onchange="preview(event)">
<span id="pfpText">Tap to upload</span>
<img id="pfpImg">
</label>

<div class="labelpfp">Upload image</div>

<div class="label">Add Caption</div>

<textarea placeholder="Create caption.."></textarea>

  <div class="buttons">
      <div class="cancel"><a href="/pieblogs/profile/">Cancel</a></div>
      <button type="button" class="preview">Preview</button>
      <button type="submit" class="publish">Publish</button>
  </div>
</form>
</div>

</div>

<div class="footer">
© PieBlogs — made with ❤️
</div>

<script>
function preview(e){
    const file = e.target.files[0];
    if(file){
        document.getElementById("pfpImg").src = URL.createObjectURL(file);
        document.getElementById("pfpImg").style.display = "block";
        document.getElementById("pfpText").style.display = "none";
    }
}
</script>

</body>
{% endblock %}
</html>
