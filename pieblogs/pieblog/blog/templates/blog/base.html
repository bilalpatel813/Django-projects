<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PieBlogs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f5f5f5;
    margin: 0;
}

/* Topbar */
.topbar {
    background: white;
    border-bottom: 1px solid #ddd;
}

.logo {
    font-family: 'Pacifico', cursive;
    text-align: center;
    font-size: 22px;
}

.logo a {
    color: #667eea;
    text-decoration: none;
}

.nav-icons {
    display: flex;
    justify-content: space-around;
    padding: 10px;
    align-items: center;
}

.nav-item {
    text-align: center;
    font-size: 12px;
}

.nav-item i {   
    font-size: 20px;
    display: block;
    margin-bottom: 3px;
    padding-top:10px;
}

.nav-item a {
    text-decoration:none;
    color:black;
}

/* PLUS DROPDOWN */
.plus-wrapper {
    position: relative;
    display: inline-block;
    cursor: pointer;
}

.plus-menu {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%) scale(0.9);
    background: white;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    padding: 8px 0;
    width: 150px;
    opacity: 0;
    pointer-events: none;
    transition: 0.2s;
    z-index: 999;
}

.plus-wrapper:hover .plus-menu {
    opacity: 1;
    transform: translateX(-50%) scale(1);
    pointer-events: auto;
}

.plus-item {
    padding: 10px 15px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
    color: black;
    transition: 0.2s;
}

.plus-item:hover {
    background: #f5f7ff;
}

.plus-item i {
    color: #667eea;
    margin: 0;
    padding: 0;
    display: inline;
}

/* OVERLAY */
.overlay {
    display:none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    justify-content:center;
    align-items:center;
    z-index:999;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
     from {opacity:0;} to {opacity:1;}
      }
@keyframes slideUp { 
from { transform: translateY(40px); opacity:0; } to { transform: translateY(0); opacity:1; } 

}

.settings-container {
    width:100%;
    max-width:360px;
    padding:15px;
    animation: slideUp 0.3s ease;
}

.settings-card {
    background:white;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
    overflow:hidden;
}

/* Header Fix */
.settings-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px;
}

.user-profile {
    display:flex;
    align-items:center;
    gap:10px;
}

.settings-avatar {
    width:38px;
    height:38px;
    background:#667eea;
    border-radius:50%;
    overflow: hidden; /* Fix image overflow */
    display:flex;
    align-items:center;
    justify-content:center;
}

.settings-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.username {
    font-weight:600;
    font-size:16px;
}

.close-btn {
    background:#f0f2f5;
    border:none;
    width:32px;
    height:32px;
    border-radius:50%;
    cursor:pointer;
}

.divider {
    height:1px;
    background:#eee;
}

.settings-item {
    display:flex;
    align-items:center;
    padding:15px 18px;
    text-decoration:none;
    color:#111;
    font-size:15px;
    transition:0.2s;
}

.settings-item i {
    width:36px;
    height:36px;
    background:#f0f2f5;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:12px;
    color:#667eea;
}

.settings-item:hover {
    background:#f8f9ff;
}

.logout-item i { background:#ffecec; color:#e63946; }
.logout-item span { color:#e63946; }

/* Delete Modal */
.modal {
    display: none;
    position: fixed;
    z-index: 9999;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: white;
    padding: 20px;
    width: 280px;
    border-radius: 10px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.delete-btn {
    background: red;
    color: white;
    border: none;
    margin-top:10px;
    display: block;
    margin-inline: auto;
    width:100px;
    height:30px;
    border-radius:30px;
    cursor: pointer;
}
.cancel-btn{
    background:black;
    color:white;
    border: none;
    margin-top: 10px;
    display: block;
    margin-inline: auto;
    width:100px;
    height:30px;
    border-radius:30px;
    cursor: pointer;
}

.footer {
    text-align: center;
    font-size: 12px;
    color: #666;
    padding: 15px;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="nav-icons">
        <div class="nav-item">
            <div class="logo"><a href="{% url 'home' %}">PieBlogs</a></div>
        </div>

        <div class="nav-item">
            <a href="{% url 'home' %}">
                <i class="fa-solid fa-house"></i>
            </a>
        </div>

        <div class="nav-item plus-wrapper">
            <i class="fa-solid fa-plus"></i>
            <div class="plus-menu">
                <a href="{% url 'post_create' %}" class="plus-item">
                    <i class="fa-solid fa-pen"></i> Create Post
                </a>
                <a href="{% url 'blog_create' %}" class="plus-item">
                    <i class="fa-solid fa-blog"></i> Create Blog
                </a>
            </div>
        </div>

        <div class="nav-item">
            <a href="javascript:void(0)" onclick="togglesearch()"> 
                <i class="fa-solid fa-magnifying-glass"></i>
            </a>
        </div>

        <div class="nav-item">
            <div onclick="openSettings()" style="cursor:pointer">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="settingsModal">
    <div class="settings-container">
        <div class="settings-card">
            <div class="settings-header">
                <div class="user-profile">
                    <div class="settings-avatar">
                        {% load static %}
                        {% if user.profile.profilepic %}
                            <img src="{{ user.profile.profilepic.url }}" alt="Profile">
                        {% else %}
                            <img src="{% static 'images/default.jpg' %}" alt="Default">
                        {% endif %}
                    </div>
                    <span class="username">@{{ request.user.username }}</span>
                </div>
                <button class="close-btn" onclick="closeSettings()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="divider"></div>

            <a href="{% url 'profile' request.user.username %}" class="settings-item">
                <i class="fa-solid fa-circle-user"></i>
                <span>Profile</span>
            </a>

            <a href="#" class="settings-item">
                <i class="fa-solid fa-signs-post"></i>
                <span>Posts</span>
            </a>

            <a href="#" class="settings-item">
                <i class="fa-solid fa-gear"></i>
                <span>Settings</span>
            </a>

            <div class="divider"></div>

            <a href="{% url 'login' %}" class="settings-item logout-item">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>
</div>

<div id="deleteModal" class="modal">
    <div class="modal-content">
        <p id='modalText'></p>
        <form id="deleteform" method='POST'>
             {% csrf_token %}
            <button type="submit" class="delete-btn">Yes, Delete</button>
        </form>
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>
</div>

{% block content %}{% endblock %}

<div class="footer">
    © PieBlogs — made with ❤️
</div>

<script>
function openSettings(){
    document.getElementById("settingsModal").style.display="flex";
}

function closeSettings(){
    document.getElementById("settingsModal").style.display="none";
}

function openModal(postId, title) {
    document.getElementById("deleteModal").style.display = "block";
    document.getElementById("modalText").innerText = "Are you sure you want to delete '" + title + "'?";
    document.getElementById("deleteform").action = "/delete/" + postId;
}

function closeModal() {
    document.getElementById("deleteModal").style.display = "none";
}

// Fixed dropdown logic to prevent immediate closing
const plus = document.querySelector(".plus-wrapper");
plus.addEventListener("click", function(e){
    e.stopPropagation();
    const menu = this.querySelector(".plus-menu");
    const isOpen = menu.style.opacity === "1";
    menu.style.opacity = isOpen ? "0" : "1";
    menu.style.pointerEvents = isOpen ? "none" : "auto";
});

document.addEventListener("click", function(){
    const menu = document.querySelector(".plus-menu");
    if(menu) {
        menu.style.opacity = "0";
        menu.style.pointerEvents = "none";
    }
});
</script>

</body>
</html>
