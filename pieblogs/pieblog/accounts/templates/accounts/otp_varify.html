<!DOCTYPE html>
<html>
<head>
<title>OTP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {font-family:Poppins;background:#f5f5f5;margin:0;}
.container {display:flex;justify-content:center;align-items:center;height:100vh;}
.card {background:white;padding:25px;border-radius:16px;width:320px;text-align:center;}

.steps {font-size:12px;color:#777;margin-bottom:10px;}

.otp {display:flex;justify-content:space-between;}
.otp input {
    width:50px;height:50px;text-align:center;font-size:20px;
    border-radius:10px;border:1px solid #ccc;
}

button {
    width:100%;padding:10px;margin-top:15px;
    border-radius:20px;border:none;background:#667eea;color:white;
}
</style>
</head>

<body>
<div class="container">
<div class="card">

<div class="steps">Step 2 of 3</div>

<h3>Verify OTP</h3>

{% if error %}
<div style="background:#ffe0e0;color:#b30000;padding:10px;border-radius:8px;margin-bottom:10px;">
    {{ error }}
</div>
{% endif %}

<form method="POST" id="otpForm">
{% csrf_token %}

<div class="otp">
<input type="text" name="otp1" maxlength="1" oninput="move(this, 'otp2')" autofocus>
<input type="text" name="otp2" maxlength="1" oninput="move(this, 'otp3')">
<input type="text" name="otp3" maxlength="1" oninput="move(this, 'otp4')">
<input type="text" name="otp4" maxlength="1">
</div>

<!-- hidden combined OTP -->
<input type="hidden" name="otp" id="finalOtp">

<p>didn't get OTP ? 
<a href="{% url 'resendotp' %}">Resend</a>
</p>

<button type="submit">Verify</button>
</form>

</div>
</div>

<script>
function move(current, nextFieldID) {
    if (current.value.length === 1) {
        if (nextFieldID) {
            document.getElementsByName(nextFieldID)[0].focus();
        }
    }
}

// Combine OTP before submit
document.getElementById("otpForm").addEventListener("submit", function() {
    let otp =
        document.getElementsByName("otp1")[0].value +
        document.getElementsByName("otp2")[0].value +
        document.getElementsByName("otp3")[0].value +
        document.getElementsByName("otp4")[0].value;

    document.getElementById("finalOtp").value = otp;
});
</script>

</body>
</html>
