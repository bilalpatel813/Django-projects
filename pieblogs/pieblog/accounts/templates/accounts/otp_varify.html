<!DOCTYPE html>
<html>
<head>
<title>OTP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">
<style>
body {font-family:Poppins;background:#f5f5f5;margin:0;}
.container {display:flex;justify-content:center;align-items:center;height:100vh;}
.card {background:white;padding:25px;border-radius:16px;width:320px;text-align:center;}

.steps {font-size:12px;color:#777;margin-bottom:10px;}

.otp {display:flex;justify-content:space-between;}
.otp input {width:50px;height:50px;text-align:center;font-size:18px;border-radius:10px;border:1px solid #ccc;}

button {width:100%;padding:10px;margin-top:15px;border-radius:20px;border:none;background:#667eea;color:white;}
</style>
</head>

<body>
<div class="container">
<div class="card">

<div class="steps">Step 2 of 3</div>

<h3>Verify OTP</h3>
<form method='POST'>
{% csrf_token %}
<div class="otp">
{% if error %}
<div style="
    background:#ffe0e0;
    color:#b30000;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
">
    {{ error }}
</div>
{% endif %}
<input name='otp' maxlength="1"><input name='otp' maxlength="1"><input name='otp' maxlength="1"><input name='otp' maxlength="1">
</div>
<p>didn't get OTP ? <a href="{% url 'resendotp' %}"> Resend link</a> </p>
<button>Verify</button>
</form>
{{ form.errors }}
</div>
</div>
</body>
</html>
